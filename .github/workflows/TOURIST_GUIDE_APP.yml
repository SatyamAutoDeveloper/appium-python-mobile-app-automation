name: Tourist Guide App Testing
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  Execute-Travel-Guide-App-Tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.13.0'
    
    - name: Install Python & Appium Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        npm install -g appium
        appium driver install uiautomator2

    - name: Verify APK exists
      run: |
        if [ ! -f ./apps/tourist_guide_app.apk ]; then
          echo "APK file not found in ./apps folder"
          exit 1
        fi

    - name: Enable KVM permissions
      run: |
        # Ensure the emulator can access /dev/kvm on the runner
        sudo chmod a+rw /dev/kvm

    - name: Run Appium Tests in Emulator
      uses: ReactiveCircus/android-emulator-runner@v2
      with:
        api-level: 30
        arch: x86_64
        target: google_apis
        force-avd-creation: false
        disable-linux-hw-accel: false
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
        disable-animations: true
        script: |
          # Start Appium in the background inside the emulator lifecycle
          appium & 
          APPIUM_PID=$!
          # Wait for Appium to start and be ready to accept connections
          sleep 20
          # Verify emulator is ready
          adb wait-for-device
          # Run your pytest suite
          pytest tests/test_tourist_guide_app.py -v --tb=short
          TEST_RESULT=$?
          # Terminate Appium
          kill $APPIUM_PID || true
          exit $TEST_RESULT
        continue-on-error: true

    - name: Post-test Cleanup
      if: always() # Ensures this runs even if tests fail
      run: |
        adb devices | grep emulator | cut -f1 | xargs -I {} adb -s {} emu kill || true
        adb kill-server
        pkill -9 -f "emulator" || true
    
    - name: Create artifacts archive
      if: always()
      run: |
        zip -r test-artifacts.zip reports/ logs/ screenshots/ || true

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: test-artifacts.zip
        retention-days: 7