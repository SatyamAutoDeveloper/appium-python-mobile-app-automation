name: Fast Shopping App Testing
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  Execute-Fast-Shopping-App-Tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.13.0'
    
    - name: Install Python & Appium Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        npm install -g appium
        appium driver install uiautomator2

    - name: Verify APK exists
      run: |
        if [ ! -f ./apps/fastshopping.apk ]; then
          echo "APK file not found in ./apps folder"
          exit 1
        fi

    - name: Enable KVM permissions
      run: |
        # Ensure the emulator can access /dev/kvm on the runner
        sudo chmod a+rw /dev/kvm

    - name: Run Appium Tests in Emulator
      uses: ReactiveCircus/android-emulator-runner@v2
      continue-on-error: true
      with:
        api-level: 30
        arch: x86_64
        target: google_apis
        force-avd-creation: false
        disable-linux-hw-accel: false
        emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot-save -no-audio -no-boot-anim
        disable-animations: true
        script: |
          # Start Appium and redirect output to a file so it doesn't hang the pipe
          nohup appium > appium.log 2>&1 & 
          
          # Wait for Appium (checking port 4723 is better than just sleep)
          timeout 60s bash -c 'until nc -z localhost 4723; do sleep 2; done' || true
          
          adb wait-for-device
          
          # Run tests and capture result
          pytest tests/test_fast_shopping_app.py -v --tb=short --app_name="fastshopping_app"
          TEST_RESULT=$?
          
          # Force kill all appium/node processes
          pkill -9 -f appium || true
          pkill -9 -f node || true
          
          exit $TEST_RESULT

    - name: Post-test Cleanup
      if: always() # Ensures this runs even if tests fail
      run: |
        adb devices | grep emulator | cut -f1 | xargs -I {} adb -s {} emu kill || true
        adb kill-server
        pkill -9 -f "emulator" || true
    
    - name: Create artifacts archive
      if: always()
      run: |
        zip -r test-artifacts.zip reports/ logs/ screenshots/ || true

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-artifacts
        path: test-artifacts.zip
        retention-days: 7